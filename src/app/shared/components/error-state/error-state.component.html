<div class="error-state">

    <div class="error-card">

        <div class="icon">

            ⚠️

        </div>

        <h2>

            {{ title }}

        </h2>

        <p>

            {{ message }}

        </p>

        <button class="retry-btn" (click)="
        retry.emit()
      ">

            {{ buttonText }}

        </button>

    </div>

</div>
