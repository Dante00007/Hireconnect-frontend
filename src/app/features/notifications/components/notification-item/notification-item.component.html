<div

  class="notification-item"

  [class.unread]="
    !notification.isRead
  "

  (click)="
    read.emit(
      notification.notificationId
    )
  "
>

  <div class="notification-header">

    <h4>
      {{ notification.title }}
    </h4>

    @if(!notification.isRead) {

      <span class="dot"></span>

    }

  </div>

  <p>
    {{ notification.message }}
  </p>

  <small>

    {{
      notification.createdAt
        | date : 'medium'
    }}

  </small>

</div>
