<section class="features-section animate-fade-up">

    <div class="section-header">

        <h2>
            Powerful Hiring Features
        </h2>

        <p>
            Everything recruiters and
            candidates need in one
            modern hiring platform.
        </p>

    </div>

    <div class="features-grid">

        @for(
        feature of features;
        track feature.title
        ) {

        <app-feature-card [icon]="feature.icon" [title]="feature.title" [description]="
          feature.description
        " />

        }

    </div>

</section>
